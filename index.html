<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #111119 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #4f46e5;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        p {
            color: #a1a1aa;
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Countdown Timer Styling */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            min-width: 80px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .time-box span {
            display: block;
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
        }

        .time-box .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #71717a;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* Subscription Form Styling */
        .subscription-form {
            display: flex;
            gap: 10px;
            max-width: 450px;
            margin: 0 auto;
        }

        .subscription-form input[type="email"] {
            flex: 1;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .subscription-form input[type="email"]:focus {
            border-color: #4f46e5;
        }

        .subscription-form button {
            padding: 12px 24px;
            background: #4f46e5;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .subscription-form button:hover {
            background: #4338ca;
        }

        /* Responsive Breakpoints */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .countdown { gap: 10px; }
            .time-box { min-width: 65px; padding: 10px; }
            .time-box span { font-size: 1.5rem; }
            .subscription-form { flex-direction: column; }
            .subscription-form button { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">BrandName</div>
        <h1>We're Launching Soon</h1>
        <p>Our website is currently under construction. Sign up to our newsletter to receive an update when we go live!</p>

        <!-- Countdown Timer -->
        <div class="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <div class="label">Days</div>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <div class="label">Hours</div>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <div class="label">Mins</div>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <div class="label">Secs</div>
            </div>
        </div>

        <!-- Email Signup -->
        <form class="subscription-form" onsubmit="event.preventDefault(); alert('Thank you for subscribing!');">
            <input type="email" placeholder="Enter your email address" required>
            <button type="submit">Notify Me</button>
        </form>
    </div>

    <script>
        // Set your target launch date here (YYYY-MM-DD format)
        const launchDate = new Date("2026-12-31T00:00:00").getTime();

        const countdownFunction = setInterval(() => {
            const now = new Date().getTime();
            const distance = launchDate - now;

            // Time calculations for days, hours, minutes and seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Output the results in the respective elements
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            // If the countdown is over, display text
            if (distance < 0) {
                clearInterval(countdownFunction);
                document.querySelector(".countdown").innerHTML = "<h3>We are live!</h3>";
            }
        }, 1000);
    </script>

</body>
</html>
